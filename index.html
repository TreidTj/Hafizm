<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafizm | Memorize the Quran</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0B0B;
            --accent: #FF7A00;
            --gold: #FFC46B;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }
        
        nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; display: flex; justify-content: space-around; padding: 15px; background: rgba(11, 11, 11, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #222; }
        .nav-item { cursor: pointer; color: #666; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        
        button { cursor: pointer; border: none; background: none; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-glow { background: var(--accent); color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; box-shadow: 0 0 15px rgba(255, 122, 0, 0.3); }

        .screen { padding: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .surah-item { display: flex; justify-content: space-between; padding: 15px; margin-bottom: 10px; }
        
        .arabic { font-family: 'Noto Sans Arabic', sans-serif; }
    </style>
</head>
<body>
    <div id="app">
        <main id="content" class="screen"></main>
        <nav>
            <div class="nav-item active" onclick="router('home')">Home</div>
            <div class="nav-item" onclick="router('pages')">Pages</div>
            <div class="nav-item" onclick="router('audio')">Audio</div>
            <div class="nav-item" onclick="router('profile')">Profile</div>
        </nav>
    </div>

    <script>
        const state = { screen: 'home', progress: JSON.parse(localStorage.getItem('hafizm_prog')) || {} };
        
        function router(screen) {
            state.screen = screen;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="router('${screen}')"]`).classList.add('active');
            render();
        }

        function render() {
            const content = document.getElementById('content');
            if (state.screen === 'home') content.innerHTML = renderHome();
            else if (state.screen === 'pages') content.innerHTML = renderPages();
            else if (state.screen === 'audio') content.innerHTML = renderAudio();
            else if (state.screen === 'profile') content.innerHTML = renderProfile();
        }

        function renderHome() {
            return `
                <h1 style="font-size: 24px; margin-bottom: 20px;">Hafizm</h1>
                <p style="color: #888; margin-bottom: 20px;">Memorize the Quran with precision</p>
                <div class="glass" style="padding: 10px;">
                    ${Array.from({length: 5}).map((_, i) => \`
                        <div class="surah-item glass" onclick="openAyahMode(\${i+1})">
                            <span>\${i+1}. Surah Name</span>
                            <span class="arabic">سورة الفاتحة</span>
                        </div>
                    \`).join('')}
                </div>
            `;
        }

        function openAyahMode(surahId) {
            document.getElementById('content').innerHTML = \`
                <div class="screen">
                    <button onclick="router('home')">← Back</button>
                    <div class="glass" style="margin-top: 20px; padding: 40px; text-align: center;">
                        <p id="ayah-text" class="arabic" style="font-size: 28px;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
                        <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                            <button class="btn-glow" onclick="simulateVoice()">🎙 Mic</button>
                            <button class="glass" style="padding: 10px 20px;">👁</button>
                        </div>
                    </div>
                </div>
            \`;
        }

        function simulateVoice() {
            const el = document.getElementById('ayah-text');
            el.style.opacity = '0';
            setTimeout(() => {
                el.style.opacity = '1';
                el.innerText = 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
            }, 1000);
        }

        function renderPages() {
            return \`<h1>Mushaf Pages</h1><div class="glass" style="height: 300px; display: flex; align-items: center; justify-content: center;">Page 1</div>\`;
        }

        function renderAudio() {
            return \`<h1>Audio Player</h1><div class="glass" style="padding: 20px;">
                <button class="btn-glow" style="width: 100%;">▶ Play</button>
                <select style="width: 100%; margin-top: 20px; padding: 10px; background: #222; color: white; border-radius: 10px;">
                    <option>Yasser Al-Dosari</option>
                    <option>Sudais</option>
                </select>
            </div>\`;
        }

        function renderProfile() {
            return \`
                <h1>Profile</h1>
                <div class="glass" style="padding: 20px; margin-top: 20px;">
                    <p>Level: Beginner</p>
                    <div style="margin-top: 20px;">
                        <button class="btn-glow" onclick="window.open('https://t.me/muu3')">Telegram Support</button>
                    </div>
                    <div style="margin-top: 20px;">
                        <h3>Subscription</h3>
                        <p>Free: 2 ayahs/day</p>
                        <p>Month: 2000₽</p>
                    </div>
                </div>
            \`;
        }

        router('home');
    </script>
</body>
</html>
